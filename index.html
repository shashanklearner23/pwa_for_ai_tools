<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#007bff">
    <title>AI Search Tool</title>
    
    <link rel="manifest" href="manifest.json">
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { color: #333; margin-top: 30px; }
        .container {
            width: 100%;
            max-width: 600px;
            margin-top: 20px;
        }
        .project-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .project-card:hover {
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }
        .project-card:active {
            transform: scale(0.98);
        }
        .project-info h3 {
            margin: 0;
            color: #007bff;
        }
        .project-info p {
            margin: 5px 0 0;
            font-size: 14px;
            color: #666;
        }
        .arrow {
            color: #ccc;
            font-size: 20px;
        }

        /* Install button */
        #install-btn {
            display: none;
            margin: 16px auto 0;
            padding: 12px 28px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(0,123,255,0.35);
            animation: pulse 2s infinite;
        }
        #install-btn.visible { display: block; }
        @keyframes pulse {
            0%,100% { box-shadow: 0 4px 14px rgba(0,123,255,0.35); }
            50%      { box-shadow: 0 4px 24px rgba(0,123,255,0.6); }
        }
    </style>
</head>
<body>

    <h1>AI Search Tool</h1>
    <button id="install-btn" onclick="doInstall()">⬇ Install App</button>
    
    <div class="container" id="project-list">
        </div>

    <script>
        // --- 1. CONFIGURATION: YOUR ACTUAL URLS ---
        const myProjects = [
            { 
                name: "AI Search Tool", 
                url: "https://script.google.com/macros/s/AKfycby3vhl4nIy3AKers4-OT38Ru31DT3NNGDhtAovK59JqurQQ67dWUN4zaAn-231_G__M/exec", 
                description: "AI Search Tool" 
            }
            // You can add more { name: "", url: "", description: "" } objects here later
        ];

        // --- 2. RENDER PROJECTS ---
        const listContainer = document.getElementById('project-list');
        
        myProjects.forEach(project => {
            const card = document.createElement('a');
            card.href = project.url;
            card.className = 'project-card';
            card.target = "_blank"; 

            card.innerHTML = `
                <div class="project-info">
                    <h3>${project.name}</h3>
                    <p>${project.description}</p>
                </div>
                <div class="arrow">➔</div>
            `;
            listContainer.appendChild(card);
        });

        // --- 3. REGISTER SERVICE WORKER ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('PWA Service Worker registered!'))
                    .catch(err => console.log('PWA Registration failed:', err));
            });
        }

        // --- PWA INSTALL ---
        let deferredPrompt = null;
        const installBtn = document.getElementById('install-btn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.classList.add('visible');
        });

        async function doInstall() {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            deferredPrompt = null;
            installBtn.classList.remove('visible');
        }

        window.addEventListener('appinstalled', () => {
            installBtn.classList.remove('visible');
        });
    </script>
</body>
</html>
